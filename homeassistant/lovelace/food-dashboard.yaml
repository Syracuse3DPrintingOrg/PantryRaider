title: Food Tracker
views:
  - title: Food
    path: food
    icon: mdi:fridge-outline
    cards:

      # ── Status Tiles ─────────────────────────────────────────────────────────
      - type: grid
        columns: 2
        square: false
        cards:
          - type: tile
            entity: sensor.food_expired
            name: Expired
            icon: mdi:food-off
            color: red
          - type: tile
            entity: sensor.food_expiring_today
            name: Today
            icon: mdi:food-variant-off
            color: deep-orange
          - type: tile
            entity: sensor.food_expiring_3_days
            name: 3 Days
            icon: mdi:food-drumstick
            color: amber
          - type: tile
            entity: sensor.food_expiring_7_days
            name: 7 Days
            icon: mdi:food-apple
            color: green

      # ── Alerts (only shows when something needs attention) ──────────────────
      - type: conditional
        conditions:
          - condition: or
            conditions:
              - condition: numeric_state
                entity: sensor.food_expired
                above: 0
              - condition: numeric_state
                entity: sensor.food_expiring_today
                above: 0
        card:
          type: markdown
          content: >
            {% set expired = states('sensor.food_expired') | int(0) %}
            {% set today = states('sensor.food_expiring_today') | int(0) %}
            {% if expired > 0 %}❌ **{{ expired }} item(s) EXPIRED** — check the fridge

            {% endif %}
            {% if today > 0 %}🔴 **{{ today }} expiring today** — use them up!{% endif %}

      # ── Action Buttons ────────────────────────────────────────────────────────
      - type: grid
        columns: 2
        square: false
        cards:
          - type: button
            name: Add Food
            icon: mdi:barcode-scan
            icon_height: 44px
            tap_action:
              action: url
              url_path: https://fass.korolev.link/ui/add
          - type: button
            name: Inventory
            icon: mdi:view-grid-outline
            icon_height: 44px
            tap_action:
              action: url
              url_path: https://fass.korolev.link/ui/inventory
          - type: button
            name: Expiring Items
            icon: mdi:clock-alert-outline
            icon_height: 44px
            tap_action:
              action: url
              url_path: https://fass.korolev.link/ui/
          - type: button
            name: Expiry Defaults
            icon: mdi:table-edit
            icon_height: 44px
            tap_action:
              action: url
              url_path: https://fass.korolev.link/ui/defaults
          - type: button
            name: Grocy Stock
            icon: mdi:fridge
            icon_height: 44px
            tap_action:
              action: url
              url_path: http://192.168.1.170:9383/stockoverview
