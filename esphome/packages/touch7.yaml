# Profile: touch7 (Waveshare ESP32-S3 Touch LCD 7: 800x480 RGB panel, GT911
# touch, CH422G IO expander)
#
# A touch Cub: the LVGL layout shows the expiring list, a timers view with
# per-timer "+1 min" and "Dismiss" buttons, preset timer start buttons, and a
# probe view. The screen follows the server's view decision; the row of
# buttons along the top overrides it by hand ("Auto" hands control back).
#
# The RGB panel is fed from PSRAM, so this profile pins an octal-PSRAM S3
# build. That is also why the Improv BLE stack and the framebuffers share
# memory; if you add heavy extras (bluetooth_proxy and friends), watch the
# free PSRAM in the logs.

substitutions:
  cub_profile: touch7

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 8MB
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

i2c:
  sda: GPIO8
  scl: GPIO9
  frequency: 400kHz

# The board routes the panel's reset/enable lines through a CH422G expander;
# the display model preset below picks this up automatically.
ch422g:
  - id: io_expander

touchscreen:
  - platform: gt911
    id: cub_touch
    interrupt_pin: GPIO4

# Optional: Home Assistant Bluetooth proxy. Uncomment both blocks and this
# Cub becomes a remote Bluetooth radio for Home Assistant, relaying BLE
# devices near the kitchen (thermometers, plant sensors, buttons) to HA.
# Off by default, and on this board it is a real tradeoff: the 800x480 LVGL
# framebuffers already live in PSRAM, and an active proxy adds the Bluetooth
# stack plus connection buffers alongside them. If the logs show allocation
# failures or the UI stutters after enabling this, drop the LVGL buffer_size
# below, or set active: false (advertisement relay only, no connections),
# or leave proxying to a smaller Cub.
# esp32_ble_tracker:
#   scan_parameters:
#     active: true
# bluetooth_proxy:
#   active: true

display:
  - platform: mipi_rgb
    id: cub_display
    model: ESP32-S3-TOUCH-LCD-7-800X480
    auto_clear_enabled: false
    update_interval: never

globals:
  # A touch-selected view; empty string means "follow the server".
  - id: g_view_override
    type: std::string
    restore_value: no
  # Timer ids currently bound to the four on-screen timer rows.
  - id: g_timer_ids
    type: std::vector<std::string>
    restore_value: no

lvgl:
  displays: [cub_display]
  touchscreens: [cub_touch]
  buffer_size: 25%
  default_font: montserrat_28
  style_definitions:
    - id: section_style
      bg_color: 0x101014
      border_width: 0
      radius: 0
      pad_all: 10
  widgets:
    # --- Manual override row -------------------------------------------------
    - obj:
        id: nav_bar
        x: 0
        y: 0
        width: 800
        height: 64
        bg_color: 0x1b1b22
        border_width: 0
        radius: 0
        pad_all: 6
        layout:
          type: flex
          flex_flow: row
          pad_column: 8
        widgets:
          - button:
              id: nav_auto
              height: 48
              widgets:
                - label:
                    text: "Auto"
              on_click:
                then:
                  - lambda: 'id(g_view_override) = "";'
          - button:
              id: nav_expiring
              height: 48
              widgets:
                - label:
                    text: "Expiring"
              on_click:
                then:
                  - lambda: 'id(g_view_override) = "expiring";'
          - button:
              id: nav_timers
              height: 48
              widgets:
                - label:
                    text: "Timers"
              on_click:
                then:
                  - lambda: 'id(g_view_override) = "timers";'
          - button:
              id: nav_probe
              height: 48
              widgets:
                - label:
                    text: "Probes"
              on_click:
                then:
                  - lambda: 'id(g_view_override) = "probe";'
          - button:
              id: nav_presets
              height: 48
              widgets:
                - label:
                    text: "Presets"
              on_click:
                then:
                  - lambda: 'id(g_view_override) = "presets";'

    # --- Pairing / offline ---------------------------------------------------
    - obj:
        id: sec_pairing
        styles: section_style
        x: 0
        y: 64
        width: 800
        height: 416
        widgets:
          - label:
              id: lbl_pair_title
              align: TOP_MID
              y: 30
              text_color: 0xF2006E
              text: "PANTRY RAIDER"
          - label:
              id: lbl_pair_code
              align: CENTER
              text_font: montserrat_48
              text: ""
          - label:
              id: lbl_pair_hint
              align: BOTTOM_MID
              y: -20
              text_color: 0x909090
              text: ""

    # --- Expiring ------------------------------------------------------------
    - obj:
        id: sec_expiring
        styles: section_style
        hidden: true
        x: 0
        y: 64
        width: 800
        height: 416
        layout:
          type: flex
          flex_flow: column
          pad_row: 10
        widgets:
          - label:
              id: lbl_exp_counts
              text_color: 0xF2006E
              text: "Expiring"
          - label:
              id: lbl_exp_0
              text: ""
          - label:
              id: lbl_exp_1
              text: ""
          - label:
              id: lbl_exp_2
              text: ""
          - label:
              id: lbl_exp_3
              text: ""
          - label:
              id: lbl_exp_4
              text: ""

    # --- Timers ----------------------------------------------------------------
    - obj:
        id: sec_timers
        styles: section_style
        hidden: true
        x: 0
        y: 64
        width: 800
        height: 416
        layout:
          type: flex
          flex_flow: column
          pad_row: 8
        widgets:
          - label:
              id: lbl_timers_empty
              text_color: 0x909090
              text: "No timers running"
          - obj:
              id: row_timer_0
              hidden: true
              width: 100%
              height: 90
              bg_color: 0x1b1b22
              border_width: 0
              pad_all: 8
              layout:
                type: flex
                flex_flow: row
                pad_column: 12
              widgets:
                - label:
                    id: lbl_timer_0
                    width: 420
                    text: ""
                - button:
                    id: btn_extend_0
                    height: 64
                    widgets:
                      - label:
                          text: "+1 min"
                    on_click:
                      then:
                        - lambda: |-
                            if (id(g_timer_ids).size() > 0)
                              id(pantry)->timer_extend(id(g_timer_ids)[0]);
                - button:
                    id: btn_dismiss_0
                    height: 64
                    widgets:
                      - label:
                          text: "Dismiss"
                    on_click:
                      then:
                        - lambda: |-
                            if (id(g_timer_ids).size() > 0)
                              id(pantry)->timer_dismiss(id(g_timer_ids)[0]);
          - obj:
              id: row_timer_1
              hidden: true
              width: 100%
              height: 90
              bg_color: 0x1b1b22
              border_width: 0
              pad_all: 8
              layout:
                type: flex
                flex_flow: row
                pad_column: 12
              widgets:
                - label:
                    id: lbl_timer_1
                    width: 420
                    text: ""
                - button:
                    id: btn_extend_1
                    height: 64
                    widgets:
                      - label:
                          text: "+1 min"
                    on_click:
                      then:
                        - lambda: |-
                            if (id(g_timer_ids).size() > 1)
                              id(pantry)->timer_extend(id(g_timer_ids)[1]);
                - button:
                    id: btn_dismiss_1
                    height: 64
                    widgets:
                      - label:
                          text: "Dismiss"
                    on_click:
                      then:
                        - lambda: |-
                            if (id(g_timer_ids).size() > 1)
                              id(pantry)->timer_dismiss(id(g_timer_ids)[1]);
          - obj:
              id: row_timer_2
              hidden: true
              width: 100%
              height: 90
              bg_color: 0x1b1b22
              border_width: 0
              pad_all: 8
              layout:
                type: flex
                flex_flow: row
                pad_column: 12
              widgets:
                - label:
                    id: lbl_timer_2
                    width: 420
                    text: ""
                - button:
                    id: btn_extend_2
                    height: 64
                    widgets:
                      - label:
                          text: "+1 min"
                    on_click:
                      then:
                        - lambda: |-
                            if (id(g_timer_ids).size() > 2)
                              id(pantry)->timer_extend(id(g_timer_ids)[2]);
                - button:
                    id: btn_dismiss_2
                    height: 64
                    widgets:
                      - label:
                          text: "Dismiss"
                    on_click:
                      then:
                        - lambda: |-
                            if (id(g_timer_ids).size() > 2)
                              id(pantry)->timer_dismiss(id(g_timer_ids)[2]);
          - obj:
              id: row_timer_3
              hidden: true
              width: 100%
              height: 90
              bg_color: 0x1b1b22
              border_width: 0
              pad_all: 8
              layout:
                type: flex
                flex_flow: row
                pad_column: 12
              widgets:
                - label:
                    id: lbl_timer_3
                    width: 420
                    text: ""
                - button:
                    id: btn_extend_3
                    height: 64
                    widgets:
                      - label:
                          text: "+1 min"
                    on_click:
                      then:
                        - lambda: |-
                            if (id(g_timer_ids).size() > 3)
                              id(pantry)->timer_extend(id(g_timer_ids)[3]);
                - button:
                    id: btn_dismiss_3
                    height: 64
                    widgets:
                      - label:
                          text: "Dismiss"
                    on_click:
                      then:
                        - lambda: |-
                            if (id(g_timer_ids).size() > 3)
                              id(pantry)->timer_dismiss(id(g_timer_ids)[3]);

    # --- Probe -----------------------------------------------------------------
    - obj:
        id: sec_probe
        styles: section_style
        hidden: true
        x: 0
        y: 64
        width: 800
        height: 416
        widgets:
          - label:
              id: lbl_probe_name
              align: TOP_MID
              y: 30
              text: "No probes"
          - label:
              id: lbl_probe_temp
              align: CENTER
              text_font: montserrat_48
              text_color: 0xF2006E
              text: ""
          - label:
              id: lbl_probe_target
              align: BOTTOM_MID
              y: -20
              text_color: 0x909090
              text: ""

    # --- Presets: one tap starts a shared timer everywhere ----------------------
    - obj:
        id: sec_presets
        styles: section_style
        hidden: true
        x: 0
        y: 64
        width: 800
        height: 416
        layout:
          type: flex
          flex_flow: row_wrap
          pad_column: 16
          pad_row: 16
        widgets:
          - button:
              id: btn_preset_eggs
              width: 370
              height: 110
              widgets:
                - label:
                    align: CENTER
                    text: "Eggs (6 min)"
              on_click:
                then:
                  - pantry_raider.press:
                      button: timer_eggs
          - button:
              id: btn_preset_pasta
              width: 370
              height: 110
              widgets:
                - label:
                    align: CENTER
                    text: "Pasta (10 min)"
              on_click:
                then:
                  - pantry_raider.press:
                      button: timer_pasta
          - button:
              id: btn_preset_rice
              width: 370
              height: 110
              widgets:
                - label:
                    align: CENTER
                    text: "Rice (18 min)"
              on_click:
                then:
                  - pantry_raider.press:
                      button: timer_rice
          - button:
              id: btn_preset_timer
              width: 370
              height: 110
              widgets:
                - label:
                    align: CENTER
                    text: "Timer (5/10/15/30/60)"
              on_click:
                then:
                  - pantry_raider.press:
                      button: timer_1

# Once a second: recompute the view, refresh every label, and re-bind the
# timer rows. Countdowns tick locally from deadline_epoch between polls.
interval:
  - interval: 1s
    then:
      - lambda: |-
          auto *hub = id(pantry);
          const auto &st = hub->state();

          std::string view = id(g_view_override);
          if (view.empty()) {
            view = hub->effective_view();
            if (view == "offline")
              view = "pairing";  // the pairing section doubles as the status screen
            if (view == "rotation") {
              int dwell = st.settings.rotate_seconds > 0 ? st.settings.rotate_seconds : 12;
              if (st.rotation.empty())
                view = "expiring";
              else
                view = st.rotation[(millis() / 1000 / dwell) % st.rotation.size()];
            }
            if (view != "pairing" && view != "expiring" && view != "timers" && view != "probe")
              view = "expiring";  // clock/pending have no big-screen section
          }

          lv_obj_t *sections[] = {id(sec_pairing), id(sec_expiring), id(sec_timers), id(sec_probe), id(sec_presets)};
          const char *names[] = {"pairing", "expiring", "timers", "probe", "presets"};
          for (int i = 0; i < 5; i++) {
            if (view == names[i])
              lv_obj_clear_flag(sections[i], LV_OBJ_FLAG_HIDDEN);
            else
              lv_obj_add_flag(sections[i], LV_OBJ_FLAG_HIDDEN);
          }

          // Pairing / connection status.
          if (!hub->paired()) {
            if (hub->pairing_state() == esphome::pantry_raider::PAIRING_WAITING) {
              lv_label_set_text(id(lbl_pair_code), hub->pairing_code().c_str());
              lv_label_set_text(id(lbl_pair_hint), "Approve this Cub in Settings, Devices");
            } else {
              lv_label_set_text(id(lbl_pair_code), hub->pairing_line().c_str());
              lv_label_set_text(id(lbl_pair_hint), "");
            }
          } else if (!hub->online()) {
            lv_label_set_text(id(lbl_pair_code), "Server unreachable");
            lv_label_set_text(id(lbl_pair_hint), "");
          } else {
            lv_label_set_text(id(lbl_pair_code), "Connected");
            lv_label_set_text(id(lbl_pair_hint), "");
          }

          // Expiring list.
          lv_label_set_text_fmt(id(lbl_exp_counts), "Expiring: %d past, %d today, %d soon", st.expired, st.today,
                                st.soon);
          lv_obj_t *exp_labels[] = {id(lbl_exp_0), id(lbl_exp_1), id(lbl_exp_2), id(lbl_exp_3), id(lbl_exp_4)};
          for (int i = 0; i < 5; i++) {
            if (i < (int) st.top.size()) {
              const auto &item = st.top[i];
              std::string days = item.days < 0 ? "past" : (item.days == 0 ? "today" : (to_string(item.days) + " days"));
              lv_label_set_text_fmt(exp_labels[i], "%s   (%s)", item.name.c_str(), days.c_str());
            } else {
              lv_label_set_text(exp_labels[i], i == 0 && st.top.empty() ? "Nothing expiring" : "");
            }
          }

          // Timer rows: bind ids so the buttons hit the right timer.
          id(g_timer_ids).clear();
          lv_obj_t *rows[] = {id(row_timer_0), id(row_timer_1), id(row_timer_2), id(row_timer_3)};
          lv_obj_t *labels[] = {id(lbl_timer_0), id(lbl_timer_1), id(lbl_timer_2), id(lbl_timer_3)};
          for (int i = 0; i < 4; i++) {
            if (i < (int) st.timers.size()) {
              const auto &t = st.timers[i];
              id(g_timer_ids).push_back(t.id);
              lv_label_set_text_fmt(labels[i], "%s  %s", t.label.c_str(), hub->format_remaining(t).c_str());
              lv_obj_clear_flag(rows[i], LV_OBJ_FLAG_HIDDEN);
            } else {
              lv_obj_add_flag(rows[i], LV_OBJ_FLAG_HIDDEN);
            }
          }
          if (st.timers.empty())
            lv_obj_clear_flag(id(lbl_timers_empty), LV_OBJ_FLAG_HIDDEN);
          else
            lv_obj_add_flag(id(lbl_timers_empty), LV_OBJ_FLAG_HIDDEN);

          // Probe.
          if (!st.probes.empty()) {
            const auto &p = st.probes[0];
            lv_label_set_text(id(lbl_probe_name), p.name.c_str());
            lv_label_set_text_fmt(id(lbl_probe_temp), "%.0f%s%s", hub->probe_display_temp(p), hub->units_suffix(),
                                  p.stale ? " (stale)" : "");
            if (!std::isnan(p.target_c)) {
              float target = st.settings.units == "c" ? p.target_c : p.target_c * 9.0f / 5.0f + 32.0f;
              lv_label_set_text_fmt(id(lbl_probe_target), "target %.0f%s", target, hub->units_suffix());
            } else {
              lv_label_set_text(id(lbl_probe_target), "");
            }
          } else {
            lv_label_set_text(id(lbl_probe_name), "No probes");
            lv_label_set_text(id(lbl_probe_temp), "");
            lv_label_set_text(id(lbl_probe_target), "");
          }
