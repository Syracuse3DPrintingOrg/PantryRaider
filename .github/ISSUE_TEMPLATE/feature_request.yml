name: Feature request
description: Suggest an idea or improvement for Pantry Raider
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe the problem you are
        trying to solve, not just the solution you have in mind.
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem would this feature solve? What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe what you would like to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative approaches or workarounds you have thought about.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that helps explain the request, such as your deployment mode or hardware.
    validations:
      required: false
