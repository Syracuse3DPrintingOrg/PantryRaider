name: Build Cub firmware

# Compiles the Bandit Cub ESPHome firmware for every supported board profile
# and attaches the factory images to the GitHub release for the pushed tag.
# The server's flasher page (/ui/cubs) fetches these exact assets, so the
# names must stay bandit-cub-<profile>-<version>.factory.bin on the release
# tagged v<APP_VERSION> (see service/app/services/cub.py firmware_asset_name
# and release_download_url).
#
# Like publish-image.yml, this workflow ships in the repo and runs where the
# tag is pushed. Release assets only make sense on the public repo
# (Syracuse3DPrintingOrg/PantryRaider), the one the fleet and the flasher
# page pull from, so the publish job is gated to that repo explicitly rather
# than derived from context. Building still runs everywhere as a compile
# check.
#
# A broken profile must never block the others: each matrix job is
# continue-on-error, and the publish job runs regardless and reports what it
# did and did not attach. Re-run via workflow_dispatch with the tag input to
# backfill a profile after a fix lands.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and publish for (e.g. v0.18.40); blank builds the tree's APP_VERSION without publishing"
        required: false
        default: ""

permissions:
  contents: write # attach assets to the release

env:
  # Pinned to the release validated against the repo's ESPHome YAML
  # (packages/cub-base.yaml declares min_version 2026.6.0; 2026.6.5 is what
  # the firmware was built and flashed with locally). Bump deliberately,
  # after a local build, never by floating to latest.
  ESPHOME_VERSION: "2026.6.5"

jobs:
  build:
    runs-on: ubuntu-latest
    # A profile that fails to compile (touch7 is known-broken while
    # FoodAssistant-5f9m is open) must not fail the run or starve the other
    # boards of firmware.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        profile: [tdisplay, tdisplay-s3, touch7]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Cache pip and PlatformIO
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
          key: cub-fw-${{ runner.os }}-esphome-${{ env.ESPHOME_VERSION }}-${{ matrix.profile }}
          restore-keys: |
            cub-fw-${{ runner.os }}-esphome-${{ env.ESPHOME_VERSION }}-

      - name: Install ESPHome
        run: pip install "esphome==${ESPHOME_VERSION}"

      - name: Determine firmware version
        id: ver
        run: |
          set -euo pipefail
          RAW=""
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            RAW="${GITHUB_REF_NAME}"
          elif [ -n "${{ inputs.tag }}" ]; then
            RAW="${{ inputs.tag }}"
          else
            # Manual run without a tag: compile check against the tree's
            # version; the publish job will have nothing to attach to.
            RAW="v$(grep -oE 'APP_VERSION = "[0-9.]+"' service/app/config.py | grep -oE '[0-9.]+')"
          fi
          VERSION="${RAW#v}"
          if [ -z "$VERSION" ]; then
            echo "Could not determine a firmware version." >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building ${{ matrix.profile }} at version $VERSION"

      - name: Compile firmware
        run: |
          set -euo pipefail
          # -s overrides the cub_version substitution from
          # packages/cub-base.yaml at build time (command-line substitutions
          # win over YAML), so the binary reports the release version without
          # editing the tree.
          esphome -s cub_version "${{ steps.ver.outputs.version }}" \
            compile "esphome/cub-${{ matrix.profile }}.yaml"

      - name: Collect factory image
        id: collect
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          BIN="$(find esphome/.esphome/build .esphome/build -name 'firmware.factory.bin' 2>/dev/null | head -n1 || true)"
          if [ -z "$BIN" ]; then
            # Defensive: older/newer ESPHome layouts move the build dir.
            BIN="$(find . -name 'firmware.factory.bin' -not -path './.git/*' 2>/dev/null | head -n1 || true)"
          fi
          if [ -z "$BIN" ]; then
            echo "No firmware.factory.bin produced for ${{ matrix.profile }}." >&2
            exit 1
          fi
          OUT="bandit-cub-${{ matrix.profile }}-${VERSION}.factory.bin"
          mkdir -p out
          cp -f "$BIN" "out/$OUT"
          ls -lh "out/$OUT"
          echo "asset=$OUT" >> "$GITHUB_OUTPUT"
          echo "- built \`$OUT\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cub-firmware-${{ matrix.profile }}
          path: out/*.factory.bin
          if-no-files-found: error

  publish:
    # Runs even when a matrix leg failed (always()), attaches whatever was
    # built, and says plainly what is missing. Publishing is pinned to the
    # public repo: assets anywhere else would never be seen by the flasher
    # page or the fleet.
    needs: build
    if: >-
      always() &&
      github.repository == 'Syracuse3DPrintingOrg/PantryRaider' &&
      (github.ref_type == 'tag' || inputs.tag != '')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Download built firmware
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4
        with:
          pattern: cub-firmware-*
          path: firmware
          merge-multiple: true

      - name: Attach firmware to the release
        run: |
          set -euo pipefail
          REPO="${GITHUB_REPOSITORY}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ inputs.tag }}"
          fi
          echo "Publishing to release $TAG on $REPO"

          # Find the release id with drafts included. The releases/tags/<tag>
          # endpoint never returns drafts, and the release for this tag may
          # still be a draft (or not exist yet: release-image.yml creates it
          # on the same tag push and bakes an SD image first, which is slow).
          find_release_id() {
            gh api "repos/$REPO/releases?per_page=100" \
              --jq ".[] | select(.tag_name == \"$TAG\") | .id" | head -n1
          }
          RID="$(find_release_id || true)"
          if [ -z "$RID" ]; then
            # Give a concurrently created release a moment to appear, then
            # create it ourselves. softprops/action-gh-release (used by
            # release-image.yml) attaches to an existing release by tag, so
            # creating it here does not conflict with that workflow; a lost
            # creation race just means re-fetching the id.
            for _ in 1 2 3 4 5 6; do
              sleep 10
              RID="$(find_release_id || true)"
              [ -n "$RID" ] && break
            done
          fi
          if [ -z "$RID" ]; then
            gh release create "$TAG" --repo "$REPO" --title "$TAG" \
              --generate-notes || true
            RID="$(find_release_id || true)"
          fi
          if [ -z "$RID" ]; then
            echo "Could not find or create a release for $TAG." >&2
            exit 1
          fi

          echo "## Cub firmware for $TAG" >> "$GITHUB_STEP_SUMMARY"
          published=0
          shopt -s nullglob
          for f in firmware/*.factory.bin; do
            name="$(basename "$f")"
            # Clobber by hand via the release id so this also works while the
            # release is still a draft (gh release upload --clobber resolves
            # non-draft tags only in some gh versions; the API path is exact).
            aid="$(gh api "repos/$REPO/releases/$RID/assets?per_page=100" \
              --jq ".[] | select(.name == \"$name\") | .id" | head -n1 || true)"
            if [ -n "$aid" ]; then
              gh api --method DELETE "repos/$REPO/releases/$RID/assets/$aid"
            fi
            curl -sSf -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$f" \
              "https://uploads.github.com/repos/$REPO/releases/$RID/assets?name=$name" \
              > /dev/null
            echo "- published \`$name\`" >> "$GITHUB_STEP_SUMMARY"
            published=$((published + 1))
          done

          # Say plainly which boards have no firmware on this release.
          for profile in tdisplay tdisplay-s3 touch7; do
            hits=(firmware/bandit-cub-"$profile"-*.factory.bin)
            if [ ${#hits[@]} -eq 0 ]; then
              echo "- MISSING: \`$profile\` did not build; no asset attached. Re-run this workflow (workflow_dispatch with tag $TAG) after the fix lands." >> "$GITHUB_STEP_SUMMARY"
            fi
          done
          if [ "$published" -eq 0 ]; then
            echo "No firmware was built; nothing attached." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
