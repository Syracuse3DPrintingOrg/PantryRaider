name: Publish container image

# Builds the FoodAssistant service image and publishes it to the GitHub
# Container Registry (GHCR) so users can run the app without building locally.
# Tag a release (e.g. v1.0.0) to publish a versioned image; pushes to main
# refresh the :main tag. Run manually from the Actions tab via workflow_dispatch.
#
# IMPORTANT: package visibility
# After this workflow pushes the image for the first time, the package defaults
# to private. Appliance devices cannot pull it without auth until it is made
# public. To fix: go to the repo on GitHub -> Packages -> foodassistant ->
# Package settings -> Change visibility -> Public. This is a one-time UI click
# that cannot be automated here. The firstboot.sh provisioner will fall back to
# building from local source if the pull fails, but making the package public is
# the recommended path for zero-friction appliance deploys.

on:
  push:
    branches: [main]
    tags: ["v*"]
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./service
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
