name: Publish container image

# Builds the Pantry Raider service image and publishes it to the GitHub
# Container Registry (GHCR) so users can run the app without building locally.
# Tag a release (e.g. v1.0.0) to publish a versioned image; pushes to main
# refresh the :main tag. Run manually from the Actions tab via workflow_dispatch.
#
# IMPORTANT: package visibility
# After this workflow pushes the image for the first time, the package defaults
# to private. Appliance devices cannot pull it without auth until it is made
# public. To fix: go to the repo on GitHub -> Packages -> foodassistant ->
# Package settings -> Change visibility -> Public. This is a one-time UI click
# that cannot be automated here. The firstboot.sh provisioner will fall back to
# building from local source if the pull fails, but making the package public is
# the recommended path for zero-friction appliance deploys.

on:
  push:
    branches: [main]
    tags: ["v*"]
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Pinned to the ORIGINAL image name, not github.repository. The repo was
  # renamed to PantryRaider, but a GHCR package does not rename with it, and
  # every deployed device's compose file pulls
  # ghcr.io/syracuse3dprinting/foodassistant:latest (a runtime identifier we
  # keep, like the systemd units and install paths). Deriving the name from
  # github.repository after the rename silently published to a NEW package the
  # fleet never pulls, so devices stopped updating.
  #
  # NOTE: pushes made by other workflows with GITHUB_TOKEN (e.g. Brand sync)
  # do not trigger this workflow. After such a push, run it manually from the
  # Actions tab (workflow_dispatch) if the image needs the change.
  IMAGE_NAME: syracuse3dprinting/foodassistant

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: ./service
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
