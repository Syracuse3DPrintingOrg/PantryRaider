name: Docs site

# Build the documentation website from docs/ with MkDocs Material and publish it
# to GitHub Pages. The same docs/ feeds the GitHub wiki (wiki-sync.yml), so the
# wiki and the website stay in step.
#
# One-time setup before the first publish: in the repository Settings, Pages,
# set Source to "GitHub Actions". After that this workflow deploys on every push
# to main that touches the docs (and on manual dispatch).
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "README.md"
      - "mkdocs.yml"
      - ".github/workflows/docs-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy; let an in-progress run finish rather than cancelling.
concurrency:
  group: docs-site
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Build site
        # Not --strict: some docs link to repo source files (homeassistant/,
        # streamdeck/) that are not part of the site; those are warnings, not
        # failures, and still resolve in the repo and the wiki.
        run: mkdocs build

      - name: Serve the site at docs.pantryraider.app
        # The custom domain the built site answers on. GitHub Pages reads this
        # CNAME from the artifact; the DNS record for docs.pantryraider.app must
        # point at the Pages host separately.
        run: echo "docs.pantryraider.app" > site/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4
