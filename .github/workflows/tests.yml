name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    # The app creates its data dir at import time (database.py). The default
    # /app/data is not writable on the runner, so point it at a writable path.
    env:
      DATA_DIR: /tmp/foodassistant-data
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}

      # The suite is pure logic: only the import-time dependencies of the app
      # are needed, no Grocy, Mealie, Docker, or network.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi jinja2 itsdangerous pillow python-multipart \
            sqlalchemy pydantic-settings httpx pytest "qrcode[pil]" pyyaml

      - name: Import smoke test
        run: python -c "import sys; sys.path.insert(0,'service'); from app.main import app"

      - name: Tests (pytest)
        run: python -m pytest tests/ -q

  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      # Syntax-check every shell script, including the extensionless
      # provisioning helpers (two of those are Python, so dispatch on the
      # shebang instead of assuming bash).
      - name: Shell syntax (bash -n)
        run: |
          set -e
          for f in scripts/*.sh scripts/image-build/*.sh scripts/image-build/foodassistant-*; do
            case "$f" in *.service) continue ;; esac
            [ -f "$f" ] || continue
            if head -1 "$f" | grep -q python; then
              python3 -m py_compile "$f"
            else
              bash -n "$f"
            fi
            echo "ok: $f"
          done

      # Node is preinstalled on ubuntu runners.
      - name: JavaScript syntax (node --check)
        run: |
          set -e
          for f in service/app/static/js/*.js; do
            node --check "$f"
            echo "ok: $f"
          done
