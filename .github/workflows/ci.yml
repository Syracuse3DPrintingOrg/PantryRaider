name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    # The app creates its data dir at import time (database.py). The default
    # /app/data is not writable on the runner, so point it at a writable path.
    env:
      DATA_DIR: /tmp/foodassistant-data
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r service/requirements.txt
          pip install ruff pytest pytest-cov anyio

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest)
        run: python -m pytest tests/ -q --cov=service/app --cov-report=term-missing
