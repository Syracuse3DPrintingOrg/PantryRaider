<!DOCTYPE html>
<html lang="en" data-bs-theme="{{ theme_mode }}"
      data-ui-scale="{{ ui_scale_factor | default(1.0) }}"
      data-display-rotation="{{ display_rotation | default(0) }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Resolve all relative links against the app root (or the HA Ingress prefix) -->
  <base href="{{ ingress_path }}/">
  <title>Sign In: FoodAssistant</title>
  {% if theme_css %}
  <link href="{{ theme_css }}" rel="stylesheet">
  {% else %}
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  {% endif %}
  {% if theme_overlay %}
  <link href="{{ theme_overlay }}" rel="stylesheet">
  {% endif %}
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="static/js/kiosk-display.js"></script>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh">
  <div class="card" style="width: 100%; max-width: 360px;">
    <div class="card-body p-4">
      <h5 class="card-title text-center mb-4">
        <i class="bi bi-fridge me-2"></i>FoodAssistant
      </h5>
      {% if error %}
      <div class="alert alert-danger py-2">{{ error }}</div>
      {% endif %}

      {% if step == 'totp' %}
      <p class="text-secondary small text-center mb-3">Enter the 6-digit code from your authenticator app.</p>
      <form method="post" action="ui/login">
        <div class="mb-3">
          <input type="text" class="form-control text-center fs-4 font-monospace"
                 name="totp_code" placeholder="000000"
                 inputmode="numeric" autocomplete="one-time-code"
                 maxlength="6" autofocus required>
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-shield-check me-1"></i>Verify
        </button>
      </form>
      {% else %}
      <form method="post" action="ui/login">
        <div class="mb-3">
          <input type="password" class="form-control" name="password"
                 placeholder="Password" autofocus required>
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-unlock me-1"></i>Sign In
        </button>
      </form>
      {% endif %}
    </div>
  </div>
</body>
</html>
