<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}FoodAssistant{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { padding-top: 60px; }
    .navbar-brand { font-weight: 700; letter-spacing: -0.5px; }
    .badge-days { font-size: 0.85em; }
    .table th { white-space: nowrap; }
    .btn-icon { padding: 0.2rem 0.45rem; font-size: 0.8rem; }
    .urgency-expired { color: #ff6b6b; }
    .urgency-today   { color: #ffa94d; }
    .urgency-3d      { color: #ffd43b; }
    .urgency-ok      { color: #69db7c; }
    .flash { position: fixed; top: 70px; right: 1rem; z-index: 9999; min-width: 280px; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="/ui/"><i class="bi bi-fridge me-2"></i>FoodAssistant</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link {% if active == 'inventory' %}active{% endif %}" href="/ui/">
              <i class="bi bi-grid me-1"></i>Inventory
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if active == 'expiring' %}active{% endif %}" href="/ui/expiring">
              <i class="bi bi-clock-history me-1"></i>Expiring
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if active == 'add' %}active{% endif %}" href="/ui/add">
              <i class="bi bi-plus-circle me-1"></i>Add Food
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if active == 'pending' %}active{% endif %}" href="/ui/pending">
              <i class="bi bi-hourglass-split me-1"></i>Pending
              <span class="badge rounded-pill bg-warning text-dark d-none" id="pending-nav-badge">0</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if active == 'recipes' %}active{% endif %}" href="/ui/recipes">
              <i class="bi bi-journal-richtext me-1"></i>Recipes
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if active == 'mealplan' %}active{% endif %}" href="/ui/mealplan">
              <i class="bi bi-calendar-week me-1"></i>Meal Plan
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if active == 'shopping' %}active{% endif %}" href="/ui/shopping">
              <i class="bi bi-cart me-1"></i>Shopping
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if active == 'defaults' %}active{% endif %}" href="/ui/defaults">
              <i class="bi bi-table me-1"></i>Defaults
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/docs" target="_blank">
              <i class="bi bi-code-square me-1"></i>API
            </a>
          </li>
        </ul>
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link {% if active == 'setup' %}active{% endif %}" href="/setup" title="Settings">
              <i class="bi bi-gear"></i>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/ui/logout" title="Sign out">
              <i class="bi bi-box-arrow-right"></i>
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid px-4">
    {% if message %}
    <div class="flash">
      <div class="alert alert-{{ message_type or 'success' }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    </div>
    {% endif %}
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Pending-scan badge in the navbar
    fetch('/pending/count').then(r => r.json()).then(d => {
      if (d.count > 0) {
        const b = document.getElementById('pending-nav-badge');
        b.textContent = d.count;
        b.classList.remove('d-none');
      }
    }).catch(() => {});
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
