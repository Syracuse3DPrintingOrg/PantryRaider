# Pantry Raider Bluetooth thermometer reader configuration.
# Copy to /etc/foodassistant/gadgets.toml and edit as needed. Every value has
# a working default: on the appliance itself an empty file is fine, because
# which thermometers to read is configured in the web UI (Timers page), not
# here.

# Where the Pantry Raider app is. On the appliance leave this alone.
#base_url = "http://127.0.0.1:9284"

# API key, if your install requires one for LAN clients. Prefer putting it in
# /etc/foodassistant/gadgets.env (FOODASSISTANT_API_KEY=...) so it stays out
# of this file.
#api_key = ""

# How often readings are pushed to the app, in seconds.
#push_seconds = 5

# How often the enabled flag and device list are re-pulled from the app.
#config_poll_seconds = 30

# Keep a passive BLE scan running. The scan discovers new thermometers and
# reads Combustion probes (their temperatures ride the advertisement).
#scan = true

# Use this host's I2C bus for plug-in STEMMA QT / Qwiic accessories (the
# NeoKey scan-mode selector and friends). Which accessories to drive is
# configured in the web UI, not here; set this to false only for a machine
# that should never touch its I2C bus. A host with no bus needs no setting:
# the reader reports why once and carries on.
#i2c = true

# The I2C bus number, if this host's QT connector is not on the usual bus 1.
#i2c_bus = 1

# Allow the Bluetooth status broadcast on this host. The broadcast itself is
# turned on in the app (the cub_ble_advertise setting, off by default); set
# this to false only for a machine that should never advertise at all.
#advertise = true

# Optional static devices, merged with the app's list. Normally not needed:
# add thermometers from the Timers page instead.
#[[devices]]
#id = "AA:BB:CC:DD:EE:FF"
#protocol = "inkbird"   # inkbird | thermopro | combustion | bluedot
#name = "Grill"
