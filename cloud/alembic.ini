# Alembic configuration for the Forager cloud service.
#
# The database URL is NOT set here on purpose: migrations/env.py reads it from
# the app's settings (CLOUD_DATABASE_URL), so the CLI and the running service
# always target the same database (SQLite in tests, Postgres in production).

[alembic]
# Path to migration scripts, relative to this file (and to cloud/ in the
# container, where alembic.ini is copied alongside migrations/).
script_location = migrations

# Template used to name new revision files: a date prefix keeps them sorted.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Keep timestamps in UTC.
timezone = UTC

[post_write_hooks]
# No automatic formatting hooks.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
