# Pantry Raider CUPS sidecar config (FoodAssistant-32dd).
#
# This is the containerized CUPS the server-mode app talks to (the with-printing
# compose profile). It is tuned so the app can discover, add, and print to
# printers over the compose network with no manual steps:
#
#   * ServerAlias *  - the app connects by the service name "cups", so cupsd
#     must accept that Host header. Without this, cupsd rejects the request as a
#     DNS-rebinding guard and the client sees the misleading
#     "add /version=1.1 to server name" error.
#   * Admin without a password from @LOCAL - the app (a sibling container on the
#     local docker network) runs lpadmin to add queues, so admin operations are
#     allowed from local networks without authentication. This is a private,
#     LAN-only print server; do not expose port 6631 to the internet.
#   * Listen on all interfaces + the socket, and advertise shared queues over
#     DNS-SD.
MaxLogSize 0
LogLevel warn
PageLogFormat
ServerAlias *
Listen *:631
Listen /run/cups/cups.sock
Browsing On
BrowseLocalProtocols dnssd
DefaultAuthType Basic
WebInterface Yes
<Location />
  Order allow,deny
  Allow @LOCAL
</Location>
<Location /admin>
  Order allow,deny
  Allow @LOCAL
</Location>
<Location /admin/conf>
  Order allow,deny
  Allow @LOCAL
</Location>
<Policy default>
  JobPrivateAccess default
  JobPrivateValues default
  SubscriptionPrivateAccess default
  SubscriptionPrivateValues default
  <Limit Create-Job Print-Job Print-URI Validate-Job>
    Order deny,allow
  </Limit>
  <Limit Send-Document Send-URI Hold-Job Release-Job Restart-Job Purge-Jobs Set-Job-Attributes Create-Job-Subscription Renew-Subscription Cancel-Subscription Get-Notifications Reprocess-Job Cancel-Current-Job Suspend-Current-Job Resume-Job Cancel-My-Jobs Close-Job CUPS-Move-Job CUPS-Get-Document>
    Order deny,allow
  </Limit>
  <Limit CUPS-Add-Modify-Printer CUPS-Delete-Printer CUPS-Add-Modify-Class CUPS-Delete-Class CUPS-Set-Default CUPS-Get-Devices>
    Order deny,allow
    Allow @LOCAL
  </Limit>
  <Limit Pause-Printer Resume-Printer Enable-Printer Disable-Printer Pause-Printer-After-Current-Job Hold-New-Jobs Release-Held-New-Jobs Deactivate-Printer Activate-Printer Restart-Printer Shutdown-Printer Startup-Printer Promote-Job Schedule-Job-After Cancel-Jobs CUPS-Accept-Jobs CUPS-Reject-Jobs>
    Order deny,allow
    Allow @LOCAL
  </Limit>
  <Limit Cancel-Job CUPS-Authenticate-Job>
    Order deny,allow
  </Limit>
  <Limit All>
    Order deny,allow
  </Limit>
</Policy>
