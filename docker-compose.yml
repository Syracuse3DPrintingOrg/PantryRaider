services:
  grocy:
    image: linuxserver/grocy:latest
    container_name: foodassistant-grocy
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ./grocy/data:/config
    ports:
      - "9283:80"
    restart: unless-stopped

  service:
    build: ./service
    container_name: foodassistant-service
    env_file: .env
    volumes:
      - ./service/data:/app/data
    ports:
      - "9284:8000"
    depends_on:
      - grocy
    restart: unless-stopped

