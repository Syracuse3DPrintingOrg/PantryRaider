services:
  service:
    build: ./service
    container_name: foodassistant-service
    env_file: .env
    environment:
      - TZ=America/New_York
    volumes:
      - ./service/app:/app/app
      - ./service/data:/app/data
    ports:
      - "9284:8000"
    restart: unless-stopped

