[tool.ruff]
line-length = 100
target-version = "py311"
# The app package lives under service/; tests import it via sys.path.
extend-exclude = ["service/app/static"]

[tool.ruff.lint]
# Default rules (pyflakes F, pycodestyle E/W) plus a couple of useful extras.
select = ["E", "F", "W", "I"]
# Stylistic noise that would require churny refactors of working code:
#   E402: deferred imports in main.py (after middleware) / screenshot shim
#   E701/E702: terse one-liners in the screenshot helper
#   E741: single-letter loop vars ("l") in existing router code
#   E501: the codebase predates an enforced line length; not worth reflowing
#   I001: import sorting is not enforced repo-wide yet
ignore = ["E402", "E501", "E701", "E702", "E741", "I001"]

[tool.ruff.lint.per-file-ignores]
# Local-only screenshot tool uses a one-line sys.path shim and lazy imports.
"service/screenshot_server.py" = ["F401", "E401"]
# setup.py groups several stdlib imports inside a TOTP handler on one line.
"service/app/routers/setup.py" = ["E401"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "browser: headless-browser (Playwright) tests in tests/browser/; auto-skipped when no Chromium is available",
]
